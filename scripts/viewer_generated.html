        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(0, 1, 0);
        scene.add(dirLight);

        // First Person Controls state
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        // We will maintain pitch and yaw manually
        let yaw = 0;
        let pitch = 0;

        // Mouse Events
        renderer.domElement.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        });

        renderer.domElement.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaMove = {
                x: e.offsetX - previousMousePosition.x,
                y: e.offsetY - previousMousePosition.y
            };
            
            // Sensitivity
            yaw += deltaMove.x * 0.005;
            pitch += deltaMove.y * 0.005;
            
            // Clamp pitch to avoid flipping
            pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
            
            updateCameraRotation();
            
            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        });

        renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });
        renderer.domElement.addEventListener('mouseleave', () => { isDragging = false; });

        function updateCameraRotation() {
            // Apply yaw and pitch to camera quaternion
            const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
            camera.quaternion.setFromEuler(euler);
        }

        // Load PLY
        const loader = new PLYLoader();
        loader.load(PLY_URL, function (geometry) {
            geometry.computeVertexNormals();
            // If the PLY has vertex colors, use them
            const material = new THREE.MeshBasicMaterial({ 
                vertexColors: geometry.hasAttribute('color'),
                side: THREE.DoubleSide
            });
            const mesh = new THREE.Mesh(geometry, material);
            // Flip mesh appropriately if needed, but usually we just handle it in the camera matrix
            scene.add(mesh);
            
            document.getElementById('loading').style.display = 'none';
            
            // Jump to camera 0 by default
            if(CAMERAS.length > 0) {
                window.jumpToCamera(0);
            }
        }, function (xhr) {

        }, function (error) {
            document.getElementById('loading').innerText = "Error loading mesh!";
            console.error(error);
        });

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // API to jump to camera
        window.jumpToCamera = function(index) {
            if(index < 0 || index >= CAMERAS.length) return;
            const cam = CAMERAS[index];
            const c2w = cam.c2w; // 4x4 array
            
            // c2w is a row-major 4x4 matrix from Python (MAtCha/OpenCV convention)
            // OpenCV: Z is forward, Y is down, X is right.
            // ThreeJS: Z is backward, Y is up, X is right.
            const m = new THREE.Matrix4();
            m.set(
                c2w[0][0], c2w[0][1], c2w[0][2], c2w[0][3],
                c2w[1][0], c2w[1][1], c2w[1][2], c2w[1][3],
                c2w[2][0], c2w[2][1], c2w[2][2], c2w[2][3],
                c2w[3][0], c2w[3][1], c2w[3][2], c2w[3][3]
            );
            
            // We can decompose the matrix to set position and rotation
            const position = new THREE.Vector3();
            const quaternion = new THREE.Quaternion();
            const scale = new THREE.Vector3();
            m.decompose(position, quaternion, scale);
            
            camera.position.copy(position);
            
            // OpenCV to ThreeJS coordinate conversion for rotation
            // OpenCV looks down +Z. ThreeJS looks down -Z.
            // OpenCV Y is down. ThreeJS Y is up.
            // We need to rotate 180 degrees around X axis to convert the camera's local coordinate system.
            const cvToThree = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.PI);
            quaternion.multiply(cvToThree);
            
            camera.quaternion.copy(quaternion);
            
            // Extract yaw and pitch from the new quaternion so drag works correctly from this starting point
            const euler = new THREE.Euler(0, 0, 0, 'YXZ');
            euler.setFromQuaternion(camera.quaternion);
            pitch = euler.x;
            yaw = euler.y;
            
            // Set FOV
            if (cam.fov) {
                camera.fov = cam.fov;
                camera.updateProjectionMatrix();
            }
        };

        // Listen for messages from Gradio parent
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'jumpToCamera') {
                window.jumpToCamera(event.data.index);
            }
        });
